<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg-page); }
  .specimen { margin-bottom: 4px; }
  .label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 4px; }
  .divider { border: none; border-top: 1px solid var(--border-subtle); margin: 14px 0; }
</style>
</head>
<body>
  <div class="label">Display — Lora serif, 700</div>
  <div class="specimen" style="font-family:var(--font-serif);font-size:48px;font-weight:700;line-height:1.1;letter-spacing:-0.02em;color:var(--fg-primary)">Adam's Design</div>
  <hr class="divider">
  <div class="label">Display Italic — Lora serif, 400 italic</div>
  <div class="specimen" style="font-family:var(--font-serif);font-size:36px;font-weight:400;font-style:italic;line-height:1.15;color:var(--color-coral-600)">Thoughtful work, quietly made.</div>
  <hr class="divider">
  <div class="label">H1 — Lora serif, 700</div>
  <div class="specimen" style="font-family:var(--font-serif);font-size:var(--text-4xl);font-weight:700;line-height:1.15;letter-spacing:-0.015em;color:var(--fg-primary)">Recent projects</div>
  <hr class="divider">
  <div class="label">H2 — Lora serif, 600</div>
  <div class="specimen" style="font-family:var(--font-serif);font-size:var(--text-3xl);font-weight:600;line-height:1.2;letter-spacing:-0.01em;color:var(--fg-primary)">About the work</div>
</body>
</html>
