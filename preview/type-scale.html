<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg-page); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 8px; }
  .size-label { font-size: 10px; font-family: var(--font-mono); color: var(--fg-muted); min-width: 52px; }
  .specimen { font-family: var(--font-serif); color: var(--fg-primary); line-height: 1.15; white-space: nowrap; }
</style>
</head>
<body>
  <div class="row"><div class="size-label">60px</div><div class="specimen" style="font-size:60px;font-weight:700;letter-spacing:-0.02em">Aa</div></div>
  <div class="row"><div class="size-label">48px</div><div class="specimen" style="font-size:48px;font-weight:700;letter-spacing:-0.02em">Adam's work</div></div>
  <div class="row"><div class="size-label">36px</div><div class="specimen" style="font-size:36px;font-weight:600">Recent projects</div></div>
  <div class="row"><div class="size-label">30px</div><div class="specimen" style="font-size:30px;font-weight:600">About the work</div></div>
  <div class="row"><div class="size-label">24px</div><div class="specimen" style="font-size:24px;font-weight:600">Case study title</div></div>
  <div class="row"><div class="size-label">20px</div><div class="specimen" style="font-size:20px;font-weight:500;font-family:var(--font-sans)">Section heading</div></div>
  <div class="row"><div class="size-label">18px</div><div class="specimen" style="font-size:18px;font-weight:300;font-family:var(--font-sans)">Lead paragraph body text</div></div>
  <div class="row"><div class="size-label">16px</div><div class="specimen" style="font-size:16px;font-weight:400;font-family:var(--font-sans);color:var(--fg-secondary)">Standard body text for longer reads</div></div>
  <div class="row"><div class="size-label">14px</div><div class="specimen" style="font-size:14px;font-weight:400;font-family:var(--font-sans);color:var(--fg-muted)">Small / captions / metadata</div></div>
  <div class="row"><div class="size-label">12px</div><div class="specimen" style="font-size:12px;font-weight:500;font-family:var(--font-sans);letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-muted)">Labels &amp; tags</div></div>
</body>
</html>
